name: Lint Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - name: Capture lint output
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          status=$?
          echo "$status" > lint-exit-code.txt
          exit 0
      - name: Upload lint output
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostic
          path: |
            lint.log
            lint-exit-code.txt
          retention-days: 1
