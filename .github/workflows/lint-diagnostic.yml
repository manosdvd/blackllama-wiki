name: Lint diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture lint output
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          code=$?
          {
            echo '## Temporary lint diagnostic'
            echo
            echo '```text'
            tail -n 120 lint-output.txt
            echo '```'
            echo
            echo "Lint exit code: $code"
          } > lint-comment.md
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post diagnostic to pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('lint-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
