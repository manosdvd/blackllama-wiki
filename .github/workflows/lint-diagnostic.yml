name: Build Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - name: Capture validation output
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          echo "$?" > lint-exit-code.txt
          npm run typecheck > typecheck.log 2>&1
          echo "$?" > typecheck-exit-code.txt
          npm run build > build.log 2>&1
          echo "$?" > build-exit-code.txt
          exit 0
      - name: Upload validation output
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostic
          path: |
            lint.log
            lint-exit-code.txt
            typecheck.log
            typecheck-exit-code.txt
            build.log
            build-exit-code.txt
          retention-days: 1
